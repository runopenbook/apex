name: Apex intraday refresh

on:
  schedule:
    # Every 30 min across the FULL extended session, weekdays. 08:00-23:30 UTC ≈
    # 4:00am-7:30pm ET (pre-market + regular + after-hours), plus the 8pm ET close.
    # Off-peak minutes (:07/:37, NOT :00/:30) — GitHub's free scheduler drops far fewer
    # runs when you avoid the top/bottom of the hour, its most congested times.
    # momentum_live self-gates regardless: data-only outside the midday slot, and Apex's
    # ONE trade fires at the first tick in the 1:35-3:05pm ET window (≈2pm). No 4pm trades.
    - cron: "7,37 8-23 * * 1-5"
    - cron: "7 0 * * 2-6"
  workflow_dispatch: {}

permissions:
  contents: write

# Shared queue with the daily run so the two never push at the same instant.
concurrency:
  group: apex-publish
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      # Each book is independent — a transient data hiccup in one must never stall the
      # others or block the publish step below (the bad-data case is also handled in-engine).
      - name: Re-price book + rebuild intraday (trades only in the midday window)
        run: python -m apex.momentum_live run
        continue-on-error: true
      - name: Rebuild Top-34 Nasdaq portfolio (buy & hold)
        run: python -m apex.nasdaq34
        continue-on-error: true
      - name: Rebuild Bedrock portfolio (defensive buy & hold)
        run: python -m apex.bedrock
        continue-on-error: true
      - name: Rebuild Slipstream portfolio (momentum ETF rotation)
        run: python -m apex.slipstream
        continue-on-error: true
      - name: Rebuild Ignition portfolio (generational-breakout moonshots)
        run: python -m apex.ignition
        continue-on-error: true
      - name: Publish updated dashboard data
        run: |
          git config user.name "apex-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/state.json data/nasdaq34_state.json data/bedrock_state.json data/slipstream_state.json data/ignition_state.json
          if git diff --cached --quiet; then
            echo "No data change."
          else
            git commit -m "Intraday refresh $(date -u +'%Y-%m-%d %H:%M')"
            git pull --rebase --autostash || true
            git push
          fi
