name: Apex intraday refresh

on:
  schedule:
    # Every 30 min across the FULL extended session, weekdays. 08:00-23:30 UTC ≈
    # 4:00am-7:30pm ET (pre-market + regular + after-hours), plus the 8pm ET close.
    # Data-only: NO trades happen here.
    - cron: "0,30 8-23 * * 1-5"
    - cron: "0 0 * * 2-6"
  workflow_dispatch: {}

permissions:
  contents: write

# Shared queue with the daily run so the two never push at the same instant.
concurrency:
  group: apex-publish
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Re-price book + rebuild intraday (no trading)
        run: python -m apex.momentum_live refresh
      - name: Rebuild Top-34 Nasdaq portfolio (buy & hold)
        run: python -m apex.nasdaq34
      - name: Rebuild Bedrock portfolio (defensive buy & hold)
        run: python -m apex.bedrock
      - name: Publish updated dashboard data
        run: |
          git config user.name "apex-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/state.json data/nasdaq34_state.json data/bedrock_state.json
          if git diff --cached --quiet; then
            echo "No data change."
          else
            git commit -m "Intraday refresh $(date -u +'%Y-%m-%d %H:%M')"
            git pull --rebase --autostash || true
            git push
          fi
