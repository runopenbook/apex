name: Apex daily update

on:
  schedule:
    # 21:43 UTC on weekdays — after the US market close year-round (5:43pm ET in EDT,
    # 4:43pm ET in EST). Off-peak minute (:43, not :30) so GitHub is less likely to drop it.
    - cron: "43 21 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it by hand from the Actions tab

permissions:
  contents: write

concurrency:
  group: apex-publish     # shared with the intraday refresh so pushes serialize
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Apex's trade fires earlier, in the midday window (via the refresh workflow). This
      # post-close run just marks Apex's NAV at the 4pm close — it never opens a 4pm trade.
      # continue-on-error: each book is independent — one transient hiccup must never
      # block the others or the publish step below (bad data is also handled in-engine).
      - name: Mark Apex NAV at the close
        run: python -m apex.momentum_live run
        continue-on-error: true

      - name: Rebuild Top-34 Nasdaq portfolio (buy & hold)
        run: python -m apex.nasdaq34
        continue-on-error: true

      - name: Rebuild Bedrock portfolio (defensive buy & hold)
        run: python -m apex.bedrock
        continue-on-error: true

      - name: Rebuild Slipstream portfolio (momentum ETF rotation)
        run: python -m apex.slipstream
        continue-on-error: true

      - name: Rebuild Ignition portfolio (generational-breakout moonshots)
        run: python -m apex.ignition
        continue-on-error: true

      - name: Commit & publish updated data
        run: |
          git config user.name "apex-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/apex.db data/state.json data/nasdaq34_state.json data/bedrock_state.json data/slipstream_state.json data/ignition_state.json
          if git diff --cached --quiet; then
            echo "No changes today (market closed / no new bar)."
          else
            git commit -m "Daily update $(date -u +%Y-%m-%d)"
            git push
          fi
