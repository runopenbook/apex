<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APEX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --font:"Helvetica Neue","HelveticaNeue","Helvetica Neue LT Std",Helvetica,Arial,sans-serif;
  }
  html[data-theme="light"]{
    --bg:#eceae5; --paper:#f3f2ee; --ink:#0a0a0a; --line:#0a0a0a;
    --mut:#8c887f; --grid:#d8d5cd; --inv-ink:#f3f2ee; --pulse:rgba(10,10,10,.35);
  }
  html[data-theme="dark"]{
    --bg:#0a0a0a; --paper:#0f0f0f; --ink:#ececec; --line:#ececec;
    --mut:#6a6a6a; --grid:#1c1c1c; --inv-ink:#0a0a0a; --pulse:rgba(236,236,236,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font)}
  body{-webkit-font-smoothing:antialiased;letter-spacing:-0.02em;
    transition:background .25s ease,color .25s ease}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .tight{letter-spacing:-0.05em}
  .lbl{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);font-weight:500}

  .frame{max-width:1180px;margin:0 auto;padding:0 26px 120px;
    border-left:1px solid var(--line);border-right:1px solid var(--line);min-height:100vh}

  /* header */
  header{display:flex;justify-content:space-between;align-items:flex-start;
    padding:26px 0 18px;border-bottom:1px solid var(--line)}
  .mast h1{font-size:74px;line-height:.82;font-weight:700;letter-spacing:-0.06em;margin:0}
  .mast .strat{margin-top:12px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:500}
  .tagrow{display:flex;gap:10px;align-items:center;margin-top:14px}
  .tag{border:1px solid var(--line);padding:3px 8px;font-size:9.5px;letter-spacing:.14em;
    text-transform:uppercase;font-weight:600}
  .tag.inv{background:var(--ink);color:var(--inv-ink)}
  .hctl{display:flex;flex-direction:column;align-items:flex-end;gap:12px}
  .no{font-size:10px;letter-spacing:.2em;border:1px solid var(--line);border-radius:50%;
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:600}
  .toggle{cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--ink);
    font-family:var(--font);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    font-weight:600;padding:8px 12px;display:flex;align-items:center;gap:8px;user-select:none}
  .toggle:hover{background:var(--ink);color:var(--inv-ink)}
  .toggle .dotmark{width:10px;height:10px;border:1px solid currentColor;border-radius:50%;
    background:linear-gradient(90deg,currentColor 50%,transparent 50%)}

  /* section scaffold */
  section{border-bottom:1px solid var(--line)}
  .shead{display:flex;align-items:baseline;gap:14px;padding:14px 0 16px}
  .shead .sn{font-size:11px;font-weight:700;letter-spacing:0}
  .shead .st{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);font-weight:500}
  .shead .meta{margin-left:auto;font-size:10px;letter-spacing:.06em;color:var(--mut)}

  /* metrics grid */
  .metrics{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--line)}
  .metric{padding:18px 16px 22px;border-right:1px solid var(--line)}
  .divnote{font-size:10.5px;line-height:1.5;color:var(--mut);letter-spacing:.03em;border-top:1px solid var(--grid);padding:9px 2px 0;margin-top:-1px}
  .divnote b{color:var(--ink);font-weight:600}
  .metric:last-child{border-right:none}
  .metric .k{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);font-weight:500}
  .metric .v{font-size:30px;font-weight:700;letter-spacing:-0.05em;margin-top:12px;line-height:1}
  .metric .v small{font-size:15px;font-weight:700}
  @media(max-width:820px){.metrics{grid-template-columns:repeat(3,1fr)}
    .metric:nth-child(3){border-right:none}}

  .arrow{font-size:.7em;vertical-align:.08em;margin-right:1px}

  /* chart */
  .chartwrap{padding:18px 0 24px}
  .cbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px}
  .seg{display:flex;border:1px solid var(--line)}
  .seg b{cursor:pointer;font-size:10px;font-weight:600;letter-spacing:.08em;padding:6px 11px;
    text-transform:uppercase;user-select:none;border-right:1px solid var(--line)}
  .seg b:last-child{border-right:none}
  .seg b.on{background:var(--ink);color:var(--inv-ink)}
  .rstat{font-size:13px;letter-spacing:.02em;color:var(--mut);margin:4px 0 10px;min-height:16px}
  .rstat .hl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-left:5px}
  .rstat .hp{color:var(--ink);font-weight:500}
  .rstat b{color:var(--ink);font-weight:700}
  .chartbox{position:relative;aspect-ratio:300/110}
  .chartbox canvas{display:block}
  .tdots{position:absolute;inset:0;pointer-events:none;z-index:3}
  .tdot{position:absolute;width:9px;height:9px;margin:-4.5px 0 0 -4.5px;border-radius:50%;
    background:var(--ink);border:2px solid var(--paper);pointer-events:auto;cursor:pointer;
    animation:tpulse 1.9s ease-out infinite}
  @keyframes tpulse{0%{box-shadow:0 0 0 0 var(--pulse)}70%{box-shadow:0 0 0 9px transparent}
    100%{box-shadow:0 0 0 0 transparent}}
  .tdotTip{position:absolute;transform:translate(-50%,calc(-100% - 12px));pointer-events:none;
    background:var(--ink);color:var(--inv-ink);font-size:10px;letter-spacing:.02em;
    padding:6px 9px;white-space:nowrap;opacity:0;transition:opacity .12s;z-index:6}
  .tdotTip .td{font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:9px;
    display:block;margin-bottom:2px;opacity:.6}
  .tdotTip.on{opacity:1}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  thead th{text-align:right;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);
    font-weight:500;padding:14px 4px 12px;border-bottom:1px solid var(--line)}
  thead th:first-child{text-align:left}
  tbody td{padding:13px 4px;border-bottom:1px solid var(--grid);text-align:right}
  tbody td:first-child{text-align:left}
  tbody tr:last-child td{border-bottom:none}
  .tk{font-weight:700;letter-spacing:-0.03em;font-size:14px}
  .sub{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);font-weight:500}
  .wcell{display:inline-flex;align-items:center;gap:8px;justify-content:flex-end}
  .bar{width:54px;height:7px;border:1px solid var(--line);position:relative}
  .bar i{position:absolute;left:0;top:0;bottom:0;background:var(--ink)}

  /* allocation */
  .alloc{padding:6px 0 18px}
  .arow{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--grid)}
  .arow:last-child{border-bottom:none}
  .arow .an{width:230px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:500}
  .atrack{flex:1;height:12px;border:1px solid var(--line);position:relative}
  .atrack i{position:absolute;left:0;top:0;bottom:0;background:var(--ink)}
  .arow .ap{width:54px;text-align:right;font-weight:700;font-size:12px}

  /* ledger / moves */
  .filters{display:flex;gap:8px;padding:14px 0;flex-wrap:wrap;align-items:center}
  .chip{cursor:pointer;border:1px solid var(--line);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
    font-weight:600;padding:6px 11px;user-select:none}
  .chip.on{background:var(--ink);color:var(--inv-ink)}
  .filters .ct{margin-left:auto;font-size:9.5px;letter-spacing:.1em;color:var(--mut)}
  .move{display:grid;grid-template-columns:96px 92px 1fr;gap:16px;align-items:start;
    padding:15px 0;border-bottom:1px solid var(--grid)}
  .move:last-child{border-bottom:none}
  .move .d{font-size:11px;color:var(--mut);letter-spacing:.04em}
  .act{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;
    border:1px solid var(--line);padding:3px 7px;display:inline-block}
  .act.exit{background:var(--ink);color:var(--inv-ink)}
  .mtk{font-weight:700;font-size:13px;margin-top:7px;letter-spacing:-0.02em}
  .rationale{font-size:13px;letter-spacing:-0.01em;line-height:1.45}
  .mtags{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
  .mtag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line);
    padding:2px 6px;color:var(--mut);font-weight:600}
  /* recent trades (autopilot-style) */
  .tday{border-bottom:1px solid var(--grid)}
  .tday:last-child{border-bottom:none}
  .tdhead{display:flex;align-items:center;gap:14px;padding:16px 0;cursor:pointer;user-select:none}
  .tdhead .dt{font-size:14px;font-weight:700;letter-spacing:-0.02em;width:130px}
  .tdhead .cnt{font-size:9px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line);padding:3px 8px;font-weight:600}
  .tdhead .th{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}
  .tdhead .chev{margin-left:auto;color:var(--mut);font-size:18px;line-height:1;transition:transform .15s ease}
  .tday.open .tdhead .chev{transform:rotate(90deg)}
  .tdbody{max-height:0;overflow:hidden;transition:max-height .2s ease}
  .tday.open .tdbody{max-height:600px}
  .tdbody .inner{padding:0 0 18px}
  .gl{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);font-weight:500;
    margin:8px 0 4px;border-top:1px solid var(--grid);padding-top:12px}
  .trow{display:flex;align-items:center;gap:12px;padding:8px 0}
  .trow .tt{font-weight:700;font-size:13px;width:84px;letter-spacing:-0.02em}
  .trow .tsub{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);flex:1}
  .trow .tw{font-size:13px;color:var(--mut);font-variant-numeric:tabular-nums}
  .trow .tw b{color:var(--ink);font-weight:700}
  .trow .tw .ax{margin:0 7px;color:var(--mut)}
  .foot{padding:22px 0 0;font-size:9.5px;letter-spacing:.08em;color:var(--mut);line-height:1.6}
  .empty{padding:40px 0;text-align:center;color:var(--mut);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
</style>
</head>
<body>
<div class="frame">

  <header>
    <div class="mast">
      <h1 class="tight">APEX</h1>
      <div class="strat" id="strat">—</div>
      <div class="tagrow">
        <span class="tag inv" id="modeTag">—</span>
        <span class="tag num" id="periodTag">—</span>
      </div>
    </div>
    <div class="hctl">
      <div class="no">N°1</div>
      <button class="toggle" onclick="location.href=location.pathname+'?t='+Date.now()">↻ REFRESH</button>
      <button class="toggle" id="themeBtn"><span class="dotmark"></span><span id="themeLabel">DARK</span></button>
    </div>
  </header>

  <!-- 01 OVERVIEW -->
  <section>
    <div class="shead"><span class="sn">01</span><span class="st">Overview</span>
      <span class="meta num" id="ovMeta"></span></div>
    <div class="metrics" id="metrics"></div>
    <div class="divnote" id="divNote"></div>
  </section>

  <!-- 02 PERFORMANCE -->
  <section>
    <div class="shead"><span class="sn">02</span><span class="st">Performance</span>
      <span class="meta">vs <span id="benchName">Benchmark</span></span></div>
    <div class="chartwrap">
      <div class="cbar">
        <div class="seg" id="ranges"></div>
      </div>
      <div class="rstat" id="rangeStat"></div>
      <div class="chartbox">
        <canvas id="curve" height="110"></canvas>
        <div class="tdots" id="tdots"></div>
        <div class="tdotTip" id="tdotTip"></div>
      </div>
    </div>
  </section>

  <!-- 03 HOLDINGS -->
  <section>
    <div class="shead"><span class="sn">03</span><span class="st">Holdings</span></div>
    <table><thead><tr>
      <th>Position</th><th>Theme</th><th>Weight</th><th>Return</th><th>Value</th>
    </tr></thead><tbody id="holdings"></tbody></table>
  </section>

  <!-- 04 ALLOCATION -->
  <section>
    <div class="shead"><span class="sn">04</span><span class="st">Allocation</span></div>
    <div class="alloc" id="themes"></div>
  </section>

  <!-- 05 RECENT TRADES -->
  <section>
    <div class="shead"><span class="sn">05</span><span class="st">Recent Trades</span>
      <span class="meta" id="tradeMeta"></span></div>
    <div id="tradeDays"></div>
  </section>

  <!-- 06 LEDGER -->
  <section style="border-bottom:none">
    <div class="shead"><span class="sn">06</span><span class="st">Ledger</span></div>
    <div class="filters" id="filters">
      <span class="chip on" data-f="trades">Trades</span>
      <span class="chip on" data-f="holds">Holds</span>
      <span class="chip" data-f="nomove">No-Move</span>
      <span class="ct" id="moveCount"></span>
    </div>
    <div id="moves"></div>
    <div class="foot" id="disclaimer"></div>
  </section>

</div>

<script>
const fmt=n=>'$'+Math.round(n).toLocaleString();
const pct=n=>(n>=0?'+':'−')+(Math.abs(n)*100).toFixed(1)+'%';
const arr=n=>n>=0?'<span class="arrow">▲</span>':'<span class="arrow">▽</span>';
const sig=n=>arr(n)+pct(n);
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtDate=d=>{const[y,mo,da]=d.split('-');return `${MON[+mo-1]} ${+da}, ${y}`;};
function tradeSummary(td){
  const p=[];
  if(td.closed.length) p.push('Sold '+td.closed.map(c=>c.ticker).join(', '));
  if(td.opened.length) p.push('Bought '+(td.opened.length>4?td.opened.length+' names':td.opened.map(o=>o.ticker).join(', ')));
  return p.join('   ·   ');
}

/* theme */
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('apexTheme',t);
  document.getElementById('themeLabel').textContent=(t==='light'?'DARK':'LIGHT');
  if(window.__chart) themeChart(window.__chart);
}
(function initTheme(){
  setTheme(localStorage.getItem('apexTheme')||'light');
  document.getElementById('themeBtn').addEventListener('click',()=>{
    setTheme(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light');
  });
})();
function cssv(n){return getComputedStyle(document.body).getPropertyValue(n).trim();}
function themeChart(ch){
  const ink=cssv('--ink'),mut=cssv('--mut'),grid=cssv('--grid');
  ch.data.datasets[0].borderColor=ink;
  ch.data.datasets[1].borderColor=mut;
  ch.options.scales.x.ticks.color=mut; ch.options.scales.y.ticks.color=mut;
  ch.options.scales.y.grid.color=grid;
  ch.options.plugins.legend.labels.color=mut;
  ch.update('none');
}

async function main(){
  let S;
  try{ S=await (await fetch('../data/state.json',{cache:'no-store'})).json(); }
  catch(e){ document.getElementById('metrics').innerHTML='<div class="metric">No data. Run the engine.</div>'; return; }
  const m=S.meta;

  document.getElementById('strat').textContent=(m.strategy||'Portfolio');
  const mt=document.getElementById('modeTag');
  mt.textContent=(m.mode==='forward'?'● Live':m.mode);
  document.getElementById('periodTag').textContent=m.start_date+' – '+m.last_date;
  document.getElementById('benchName').textContent=m.benchmark_label;
  document.getElementById('disclaimer').textContent=m.disclaimer;
  document.getElementById('ovMeta').textContent='updated '+((S.intraday&&S.intraday.length)?S.intraday[S.intraday.length-1].t+' ET':m.last_date);

  // Overview reads from the SAME source as the chart (latest point vs inception),
  // so the cards and the chart's ALL view always agree — incl. extended hours.
  const _src=(S.intraday&&S.intraday.length)?S.intraday:S.curve;
  const _inc=_src.find(p=>p.value!=null)||_src[0];
  const _lat=[..._src].reverse().find(p=>p.value!=null)||_src[_src.length-1];
  const navNow=_lat.value;
  const totRet=_inc.value?_lat.value/_inc.value-1:0;
  const benRet=(_inc.benchmark&&_lat.benchmark!=null)?_lat.benchmark/_inc.benchmark-1:(m.benchmark_return||0);
  const alphaNow=totRet-benRet;
  const cards=[
    ['Net Asset Value', fmt(navNow), false],
    ['Total Return', sig(totRet), true],
    [m.benchmark_label, sig(benRet), true],
    ['Alpha', sig(alphaNow), true],
    ['Moves', m.num_trades, false],
  ];
  document.getElementById('metrics').innerHTML=cards.map(([k,v,s])=>
    `<div class="metric"><div class="k">${k}</div><div class="v num tight">${v}</div></div>`).join('');

  const dv=(S.dividends&&S.dividends.total)||0;
  document.getElementById('divNote').innerHTML = dv>0
    ? 'Net Asset Value is <b>price return</b> — it excludes dividends. The held positions would have paid you <b>'+fmt(dv)+'</b> in dividend cash, tracked separately (not added to NAV).'
    : 'Net Asset Value is <b>price return</b> — it excludes dividends. No dividends have been paid yet.';

  /* blinking trade markers on the line + simple hover tooltip */
  const tdByDate={}; (S.trade_days||[]).forEach(t=>tdByDate[t.date]=t);
  const tdotsEl=document.getElementById('tdots'), tdTip=document.getElementById('tdotTip');
  function positionTradeDots(){
    const ch=window.__chart; if(!ch)return;
    const meta=ch.getDatasetMeta(0); if(!meta||!meta.data)return;
    tdotsEl.querySelectorAll('.tdot').forEach(dot=>{
      const pt=meta.data[+dot.dataset.i]; if(!pt)return;
      dot.style.left=pt.x+'px'; dot.style.top=pt.y+'px';
    });
  }
  function buildTradeDots(c){
    tdotsEl.innerHTML='';
    const pts={};   // date -> [{i, tm}] of non-null points
    c.forEach((p,i)=>{const d=p.x.slice(0,10); if(tdByDate[d]&&p.value!=null)
      (pts[d]=pts[d]||[]).push({i,tm:p.x.length>10?p.x.slice(11):'16:00'});});
    Object.keys(pts).forEach(d=>{
      const reg=pts[d].filter(o=>o.tm<='16:00');           // the regular-close bar
      const pick=(reg.length?reg:pts[d]).reduce((a,b)=>b.tm>a.tm?b:a);
      const dot=document.createElement('div'); dot.className='tdot'; dot.dataset.i=pick.i;
      dot.dataset.info=tradeSummary(tdByDate[d]); dot.dataset.date=fmtDate(d);
      tdotsEl.appendChild(dot);
    });
    positionTradeDots();
  }
  tdotsEl.addEventListener('mouseover',e=>{const d=e.target.closest('.tdot');if(!d)return;
    tdTip.innerHTML=`<span class="td">${d.dataset.date}</span>${d.dataset.info}`;
    tdTip.style.left=d.style.left; tdTip.style.top=d.style.top; tdTip.classList.add('on');});
  tdotsEl.addEventListener('mouseout',e=>{if(e.target.closest('.tdot'))tdTip.classList.remove('on');});

  /* chart */
  let curDays=1e9,curPts=[],curA0=null,curB0=null;
  const pctTick=v=>(v>=0?'+':'−')+Math.abs(v).toFixed(v===0?0:1)+'%';
  const chart=new Chart(document.getElementById('curve'),{
    type:'line',
    plugins:[{id:'tdotsPos',afterRender(){positionTradeDots();}}],
    data:{labels:[],datasets:[
      {label:'Apex',data:[],borderWidth:2,pointRadius:0,tension:.02,fill:false},
      {label:m.benchmark_label,data:[],borderWidth:1.4,borderDash:[4,4],pointRadius:0,tension:.02,fill:false},
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      onHover:(e,els)=>{if(els&&els.length){const p=curPts[els[0].index];if(p&&p.value!=null){setHead(p.value,p.benchmark,fmtTipDate(p.x));return;}}setHeadLatest();},
      plugins:{legend:{labels:{boxWidth:10,font:{family:'Helvetica Neue',size:10},
        usePointStyle:false}},
        tooltip:{displayColors:false,callbacks:{
          title:items=>{const p=curPts[items[0].dataIndex];return p?fmtTipDate(p.x):'';},
          label:c=>{const p=curPts[c.dataIndex];if(!p)return '';
            if(c.datasetIndex===0){if(p.value==null||curA0==null)return '';
              return c.dataset.label+'   '+fmtD(p.value-curA0)+'   '+pct(p.value/curA0-1);}
            if(p.benchmark==null||!curB0)return '';
            return m.benchmark_label+'   '+pct(p.benchmark/curB0-1);}}}},
      scales:{x:{ticks:{maxTicksLimit:8,font:{family:'Helvetica Neue',size:10},
          callback:function(v){const l=this.getLabelForValue(v);
            return l.length>10?(curDays===1?l.slice(11):l.slice(5)):l;}},grid:{display:false}},
        y:{ticks:{font:{family:'Helvetica Neue',size:10},
          callback:v=>pctTick(v)},grid:{}}}}
  });
  window.__chart=chart; themeChart(chart);

  const RANGES=[['1D',1],['1W',7],['1M',30],['3M',90],['6M',180],['1Y',365],['2Y',730],['ALL',1e9]];
  const daily=S.curve.map(p=>({x:p.date,t:new Date(p.date),value:p.value,benchmark:p.benchmark}));
  const intra=(S.intraday||[]).map(p=>({x:p.t,t:new Date(p.t.replace(' ','T')),value:p.value,benchmark:p.benchmark}));
  const intraSpan=intra.length>=2?(intra[intra.length-1].t-intra[0].t)/86400000:0;
  // Everything below is relative to the SELECTED timeframe's start (curA0/curB0):
  // the line, the hover box and the header all read the same baseline, in $ AND %,
  // so they can never disagree. No $/% toggle — both are shown at once.
  const fmtD=n=>(n>=0?'+$':'−$')+Math.round(Math.abs(n)).toLocaleString();
  const TFL={1:'today',7:'past week',30:'past month',90:'past 3 months',180:'past 6 months',365:'past year',730:'past 2 years'};
  const tfLabel=d=>d>=1e9?'all time':(TFL[d]||'');
  function fmtTipDate(x){const d=fmtDate(x.slice(0,10));
    if(x.length>10){const[H,M]=x.slice(11).split(':').map(Number);const h=((H+11)%12)+1;
      return d+' · '+h+':'+String(M).padStart(2,'0')+(H<12?'am':'pm');}
    return d;}
  const sessionGrid=[...new Set(intra.map(p=>p.x.slice(11)))].sort();
  // 1D = the latest session, x-axis padded to the full session; line drawn only
  // up to the latest data (brokerage-style). Other ranges: richest series available.
  function windowPoints(days){
    if(days===1 && intra.length){
      const lastDate=intra[intra.length-1].x.slice(0,10);
      const byTime={}; intra.filter(p=>p.x.slice(0,10)===lastDate).forEach(p=>byTime[p.x.slice(11)]=p);
      return sessionGrid.map(hm=>{const p=byTime[hm];
        return {x:lastDate+' '+hm, value:p?p.value:null, benchmark:p?p.benchmark:null};});
    }
    const useIntra=intra.length>=2 && (days<=31 || (days>=1e9 && intraSpan<=45));
    const src=useIntra?intra:daily;
    const last=src[src.length-1].t;
    let c=src;
    if(days<1e9){const cut=new Date(last);cut.setDate(cut.getDate()-days);c=src.filter(p=>p.t>=cut);}
    if(c.length<2) c=src.slice(-Math.min(src.length,Math.max(2,useIntra?14:2)));
    return c;
  }
  const rangeStat=document.getElementById('rangeStat');
  // Header: $ + % over the timeframe. Shows the hovered point while scrubbing, snaps
  // back to live/latest on mouse-out.
  function setHead(aVal,bVal,label){
    if(curA0==null)return;
    const dd=aVal-curA0, dr=aVal/curA0-1;
    const br=(curB0&&bVal!=null)?bVal/curB0-1:null;
    rangeStat.innerHTML=`<b>${dd>=0?'▲':'▽'} ${fmtD(dd)}</b> <span class="hp">(${pct(dr)})</span> <span class="hl">${label}</span>`
      +(br!=null?` &nbsp;·&nbsp; ${m.benchmark_label} <b>${pct(br)}</b>`:'');
  }
  function setHeadLatest(){const last=[...curPts].reverse().find(p=>p.value!=null);if(last)setHead(last.value,last.benchmark,tfLabel(curDays));}
  function applyRange(days){
    curDays=days;
    const c=windowPoints(days);
    curPts=c;
    const nn=c.filter(p=>p.value!=null);
    if(!nn.length) return;
    let a0=nn[0].value, b0=nn[0].benchmark;
    if(days===1){   // 1D baseline = yesterday's 4pm REGULAR close (the 3:30-4:00 bar),
                    // not an after-hours print. Line, box and header all use this a0.
      const today=nn[0].x.slice(0,10);
      const pb=intra.filter(p=>p.x.slice(0,10)<today && p.x.slice(11)<'16:00' && p.value!=null);
      const prev=pb.length?pb[pb.length-1]:[...daily].reverse().find(p=>p.x<today && p.value!=null);
      if(prev){ a0=prev.value; if(prev.benchmark!=null) b0=prev.benchmark; }
    }
    curA0=a0; curB0=b0;
    chart.data.labels=c.map(p=>p.x);
    chart.data.datasets[0].data=c.map(p=>p.value!=null?(p.value/a0-1)*100:null);
    chart.data.datasets[1].data=c.map(p=>(b0&&p.benchmark!=null)?(p.benchmark/b0-1)*100:null);
    chart.update('none');
    buildTradeDots(c);
    setHeadLatest();
  }
  chart.canvas.addEventListener('mouseleave',setHeadLatest);
  document.getElementById('ranges').innerHTML=RANGES.map(([l,d])=>
    `<b class="${l==='ALL'?'on':''}" data-d="${d}">${l}</b>`).join('');
  document.getElementById('ranges').addEventListener('click',e=>{
    const b=e.target.closest('b'); if(!b)return;
    document.querySelectorAll('#ranges b').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); applyRange(+b.dataset.d);
  });
  applyRange(1e9);

  /* holdings */
  const maxW=Math.max(...S.positions.map(p=>p.weight),0.0001);
  document.getElementById('holdings').innerHTML=S.positions.map(p=>`
    <tr>
      <td><span class="tk">${p.ticker}</span></td>
      <td class="sub">${p.theme}</td>
      <td><span class="wcell"><span class="bar"><i style="width:${p.weight/maxW*100}%"></i></span>
          <span class="num">${(p.weight*100).toFixed(1)}%</span></span></td>
      <td class="num">${sig(p.ret)}</td>
      <td class="num">${fmt(p.value)}</td>
    </tr>`).join('');

  /* allocation */
  const tmax=Math.max(...S.themes.map(t=>t.weight),0.0001);
  document.getElementById('themes').innerHTML=S.themes.map(t=>`
    <div class="arow">
      <div class="an">${t.theme}</div>
      <div class="atrack"><i style="width:${t.weight/tmax*100}%"></i></div>
      <div class="ap num">${(t.weight*100).toFixed(1)}%</div>
    </div>`).join('');

  /* recent trades (autopilot-style) */
  const td=S.trade_days||[];
  document.getElementById('tradeMeta').textContent=(m.num_trades||0)+' trades total';
  document.getElementById('tradeDays').innerHTML=td.length?td.map((t,i)=>`
    <div class="tday ${i===0?'open':''}">
      <div class="tdhead">
        <span class="dt">${fmtDate(t.date)}</span>
        <span class="cnt">${t.n} ${t.n===1?'trade':'trades'}</span>
        <span class="th">${t.theme||''}</span>
        <span class="chev">›</span>
      </div>
      <div class="tdbody"><div class="inner">
        ${t.closed.length?`<div class="gl">Closed</div>`+t.closed.map(c=>`
          <div class="trow"><span class="tt">${c.ticker}</span><span class="tsub">${c.theme}</span>
            <span class="tw"><b>${(c.weight*100).toFixed(1)}%</b><span class="ax">→</span><b>0%</b></span></div>`).join(''):''}
        ${t.opened.length?`<div class="gl">Opened</div>`+t.opened.map(o=>`
          <div class="trow"><span class="tt">${o.ticker}</span><span class="tsub">${o.theme}</span>
            <span class="tw"><b>0%</b><span class="ax">→</span><b>${(o.weight*100).toFixed(1)}%</b></span></div>`).join(''):''}
      </div></div>
    </div>`).join(''):'<div class="empty">No trades yet</div>';
  document.querySelectorAll('.tdhead').forEach(h=>
    h.addEventListener('click',()=>h.parentElement.classList.toggle('open')));

  /* ledger */
  const st={trades:true,holds:true,nomove:false};
  const movesEl=document.getElementById('moves');
  const exitActs=new Set(['SELL','TRIM']);
  function render(){
    const rows=S.moves.filter(d=>{
      if(d.action==='NO_MOVE') return st.nomove;
      if(d.action==='HOLD') return st.holds;
      return st.trades;
    });
    document.getElementById('moveCount').textContent=rows.length+' / '+S.moves.length;
    if(!rows.length){movesEl.innerHTML='<div class="empty">No entries</div>';return;}
    movesEl.innerHTML=rows.slice(0,400).map(d=>`
      <div class="move">
        <div class="d num">${d.date}</div>
        <div><span class="act ${exitActs.has(d.action)?'exit':''}">${d.action.replace('_',' ')}</span>
             ${d.ticker?`<div class="mtk">${d.ticker}</div>`:''}</div>
        <div><div class="rationale">${d.rationale}</div>
          <div class="mtags">
            ${d.rule?`<span class="mtag">${d.rule}</span>`:''}
            ${d.price?`<span class="mtag num">@ $${d.price.toFixed(2)}</span>`:''}
          </div></div>
      </div>`).join('');
  }
  document.getElementById('filters').addEventListener('click',e=>{
    const c=e.target.closest('.chip'); if(!c)return;
    c.classList.toggle('on'); st[c.dataset.f]=c.classList.contains('on'); render();
  });
  render();
}
main();
</script>
</body>
</html>
